short_bio: >-
  I received the B.Eng. degree and the M.Sc. degree at the Hunan Institute of Science and Technology under the supervision of <a href="#">associate Prof. Wenwu Xie</a>, in 2020 and 2023, respectively. I am currently pursuing the Ph.D. degree with Shenzhen University, advised by <a href="https://scholar.google.com/citations?user=aOEk854AAAAJ&hl=zh-CN">Prof. Yongsheng Liang</a>.
  My research interests are Intelligent Communication, Semantic Communication, Deep Joint Source-Channel, Reconfigurable Intelligent Surface, Channel Estimation, Channel Feedback, and Deep Receiver.

